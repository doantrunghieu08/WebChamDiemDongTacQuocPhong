<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập – Chấm Điểm Đi Đều</title>
  <base href="/WebChamDiemDongTacQuocPhong/">
  <link rel="stylesheet" href="/assets/css/login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">HACTECH</div>
        
        <p class="login-subtitle">Trường Cao đẳng Nghề Bách Khoa Hà Nội</p>
      </div>

      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Vai trò</label>
          <select id="user-role" class="form-input">
            <option value="teacher">Giảng viên</option>
            <option value="student">Sinh viên</option>
            <option value="admin">Quản trị viên</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" id="id-label">Mã Giảng Viên</label>
          <input 
            type="text" 
            id="student-id" 
            class="form-input" 
            placeholder="Nhập mã giảng viên..." 
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Mật Khẩu</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Nhập mật khẩu..." 
            required
          />
        </div>

        <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
      </form>

      <div class="login-footer">
        <a href="/pages/forgot-password.html" class="forgot-password-link">Quên mật khẩu?</a>
      </div>
    </div>
  </div>

  <!-- Modal Popup -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <div class="modal-result-container">
        <!-- Success Icon -->
        <div id="successIcon" class="result-icon success-icon" style="display: none;">
          <svg viewBox="0 0 52 52" width="80" height="80">
            <circle cx="26" cy="26" r="25" style="fill: none; stroke: #28a745; stroke-width: 2;"/>
            <path class="checkmark" d="M 14 27 L 24 37 L 38 15" style="fill: none; stroke: #28a745; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;"/>
          </svg>
        </div>
        <!-- Failure Icon -->
        <div id="failureIcon" class="result-icon failure-icon" style="display: none;">
          <svg viewBox="0 0 52 52" width="80" height="80">
            <circle cx="26" cy="26" r="25" style="fill: none; stroke: #dc3545; stroke-width: 2;"/>
            <line x1="16" y1="16" x2="36" y2="36" style="stroke: #dc3545; stroke-width: 3; stroke-linecap: round;"/>
            <line x1="36" y1="16" x2="16" y2="36" style="stroke: #dc3545; stroke-width: 3; stroke-linecap: round;"/>
          </svg>
        </div>
      </div>
      <div class="modal-body">
        <p id="resultMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" class="modal-btn" style="display: none;">Đóng</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/api/config.js"></script>
  <script src="/assets/js/api/auth.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
