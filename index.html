<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập – Hệ Thống Quản Lý Học Viên Quân Sự</title>
  <link rel="stylesheet" href="assets/css/globals.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <!-- Military Insignia Background -->
    <div class="login-background">
      <div class="background-pattern"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Header with Military Shield -->
      <div class="login-header">
        <div class="login-insignia">
          <svg viewBox="0 0 100 100" class="insignia-svg">
            <polygon points="50,5 95,30 95,70 50,95 5,70 5,30" fill="none" stroke="#556B2F" stroke-width="2"/>
            <text x="50" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#556B2F">⚔</text>
          </svg>
        </div>
        <h1 class="login-title">HACTECH</h1>
        <p class="login-subtitle">Cao đẳng Nghề Bách Khoa Hà Nội</p>
        <p class="login-system">Hệ Thống Quản Lý Học Viên</p>
      </div>

      <!-- Login Form -->
      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="student-id">Tên Đăng Nhập</label>
          <input 
            type="text" 
            id="student-id" 
            class="form-input" 
            placeholder="Nhập tên đăng nhập..." 
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mật Khẩu</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Nhập mật khẩu..." 
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-login w-full">
          <span class="btn-text">ĐĂNG NHẬP</span>
        </button>
      </form>

      <!-- Footer with Links -->
      <div class="login-footer">
        <a href="/pages/forgot-password.html" class="footer-link">Quên mật khẩu?</a>
        <span class="footer-divider">•</span>
        <span class="footer-text">v1.0 © 2026</span>
      </div>
    </div>
  </div>

  <!-- Modal Popup -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <div class="modal-result-container">
        <!-- Success Icon -->
        <div id="successIcon" class="result-icon success-icon" style="display: none;">
          <svg viewBox="0 0 52 52" width="80" height="80">
            <circle cx="26" cy="26" r="25" style="fill: none; stroke: #28a745; stroke-width: 2;"/>
            <path class="checkmark" d="M 14 27 L 24 37 L 38 15" style="fill: none; stroke: #28a745; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;"/>
          </svg>
        </div>
        <!-- Failure Icon -->
        <div id="failureIcon" class="result-icon failure-icon" style="display: none;">
          <svg viewBox="0 0 52 52" width="80" height="80">
            <circle cx="26" cy="26" r="25" style="fill: none; stroke: #dc3545; stroke-width: 2;"/>
            <line x1="16" y1="16" x2="36" y2="36" style="stroke: #dc3545; stroke-width: 3; stroke-linecap: round;"/>
            <line x1="36" y1="16" x2="16" y2="36" style="stroke: #dc3545; stroke-width: 3; stroke-linecap: round;"/>
          </svg>
        </div>
      </div>
      <div class="modal-body">
        <p id="resultMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" class="modal-btn" style="display: none;">Đóng</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/api/config.js"></script>
  <script src="/assets/js/api/auth.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
