server {
    listen 80;
    server_name 103.75.182.246;
    client_max_body_size 1024M;

    # ---- Frontend static files ----
    root /var/www/hactech;
    index index.html;

    # Serve static assets (css, js, images...) với cache dài
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # SPA-style: các path /pages/*.html trả file tương ứng
    location /pages/ {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # ---- Proxy API tới Spring Boot backend (port 8080) ----
    # Tất cả path bắt đầu bằng các prefix sau sẽ được forward về backend

    location /public/ {
        proxy_pass         http://127.0.0.1:8080/public/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /teacher/ {
        proxy_pass         http://127.0.0.1:8080/teacher/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /student/ {
        proxy_pass         http://127.0.0.1:8080/student/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /classes/ {
        proxy_pass         http://127.0.0.1:8080/classes/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Proxy API tới Runpod (Xử lý CORS & Giấu Token) ----
    location /runpod-ai/ {
        # proxy_pass sẽ chuyển tiếp request tới Runpod
        proxy_pass https://we5fbzw0sf65u6.api.runpod.ai/;
        proxy_ssl_server_name on;
        proxy_redirect https://we5fbzw0sf65u6.api.runpod.ai/ /runpod-ai/;
        
        # Tự động gán token từ file cấu hình riêng (đã được giấu)
        include /etc/nginx/runpod_token.conf;

        # Xử lý CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Trả về 204 ngay lập tức cho request OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ---- Root: trả index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
