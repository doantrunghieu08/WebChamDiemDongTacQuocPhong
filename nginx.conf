server {
    listen 80;
    server_name 103.75.182.246;
    client_max_body_size 1024M;

    # ---- Frontend static files ----
    root /var/www/hactech;
    index index.html;

    # Serve static assets (css, js, images...) với cache dài
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # SPA-style: các path /pages/*.html trả file tương ứng
    location /pages/ {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # ---- Proxy API tới Spring Boot backend (port 8080) ----
    # Tất cả path bắt đầu bằng các prefix sau sẽ được forward về backend

    location /public/ {
        proxy_pass         http://127.0.0.1:8080/public/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /teacher/ {
        proxy_pass         http://127.0.0.1:8080/teacher/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /student/ {
        proxy_pass         http://127.0.0.1:8080/student/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /classes/ {
        proxy_pass         http://127.0.0.1:8080/classes/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Proxy API tới Runpod (Xử lý CORS & Giấu Token) ----
    location /runpod-ai/ {
        # Bắt buộc dùng DNS IPv4 (VPS không có IPv6)
        # QUAN TRỌNG: resolver chỉ có tác dụng khi proxy_pass dùng biến
        resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;
        resolver_timeout 10s;
        set $runpod_host "5ouownrhdz1ds0.api.runpod.ai";

        # FIX 405: Khi proxy_pass dùng biến ($runpod_host), Nginx KHÔNG tự strip
        # prefix /runpod-ai/ khỏi URI. Phải dùng rewrite để strip thủ công,
        # nếu không RunPod sẽ nhận /runpod-ai/api/ai/... thay vì /api/ai/...
        rewrite ^/runpod-ai/(.*)$ /$1 break;

        proxy_pass https://$runpod_host;
        proxy_ssl_server_name on;
        proxy_ssl_protocols     TLSv1.2 TLSv1.3;

        # Các header cần thiết để Cloudflare không từ chối
        proxy_http_version 1.1;
        proxy_set_header Host           5ouownrhdz1ds0.api.runpod.ai;
        proxy_set_header Connection     "";
        proxy_set_header X-Real-IP      $remote_addr;

        # Chặn RunPod redirect về IP nội bộ — viết lại mọi redirect về proxy path
        proxy_redirect ~^https?://[^/]+/(.*)$ /runpod-ai/$1;

        # Gán token xác thực
        include /etc/nginx/runpod_token.conf;

        # Timeout lớn cho tác vụ AI nặng (10 phút)
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # CORS headers
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8';
            add_header 'Content-Length'               0;
            return 204;
        }
    }

    # ---- Root: trả index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
