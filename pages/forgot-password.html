<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên Mật Khẩu – HACTECH</title>
  <link rel="stylesheet" href="../assets/css/forgot-password.css" />
</head>
<body>

  <div class="fp-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="fp-wrapper">
    <div class="fp-card">

      <!-- ====== HEADER ====== -->
      <div class="fp-header">
        <div class="fp-logo">HACTECH</div>
        <h1 class="fp-title">Quên Mật Khẩu</h1>
        <p class="fp-subtitle">Trường Cao đẳng Nghề Bách Khoa Hà Nội</p>
      </div>

      <!-- ====== FORM EMAIL ====== -->
      <form id="email-form" class="fp-form" onsubmit="handleEmailSubmit(event)">

        <p class="fp-hint">Nhập email tài khoản để nhận mật khẩu mới qua email.</p>

        <div class="fp-field">
          <label class="fp-label" for="email-input">Email</label>
          <div class="fp-input-wrap">
            <svg class="fp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" id="email-input" class="fp-input" placeholder="example@gmail.com" autocomplete="email" required />
          </div>
          <div class="fp-field-error" id="email-error"></div>
        </div>

        <button id="email-submit" type="submit" class="fp-btn">
          <span>Gửi mật khẩu</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/>
          </svg>
        </button>

      </form>

      <!-- ====== FOOTER ====== -->
      <div class="fp-footer">
        <a href="../index.html" class="fp-back-login">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5 5-5M18 12H6"/></svg>
          Quay lại đăng nhập
        </a>
      </div>

    </div><!-- /fp-card -->
  </div><!-- /fp-wrapper -->

  <!-- ====== POPUP THÔNG BÁO ====== -->
  <div id="fp-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; border-radius:16px; padding:2rem; max-width:360px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <svg viewBox="0 0 52 52" width="64" height="64" style="margin-bottom:1rem;">
        <circle cx="26" cy="26" r="25" style="fill:none;stroke:#28a745;stroke-width:2"/>
        <path d="M14 27L24 37L38 15" style="fill:none;stroke:#28a745;stroke-width:3;stroke-linecap:round;stroke-linejoin:round"/>
      </svg>
      <p id="fp-modal-message" style="font-size:1rem; color:#333; margin-bottom:1.5rem;"></p>
      <button onclick="closeFpModal()" style="background:#28a745;color:#fff;border:none;border-radius:8px;padding:0.6rem 1.8rem;font-size:0.95rem;cursor:pointer;">OK</button>
    </div>
  </div>

  <script src="../assets/js/api/config.js"></script>
  <script src="../assets/js/api/auth.js"></script>
  <script src="../assets/js/forgot-password.js"></script>
</body>
</html>
