<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên Mật Khẩu – Chấm Điểm Đi Đều</title>
  <link rel="stylesheet" href="/assets/css/login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">HACTECH</div>
        <h1 class="login-title">Quên Mật Khẩu</h1>
        <p class="login-subtitle">Trường Cao đẳng Nghề Bách Khoa Hà Nội</p>
      </div>

      <form class="login-form" onsubmit="handleForgotPassword(event)">
        <div class="form-group">
          <label class="form-label">Mã Sinh Viên</label>
          <input 
            type="text" 
            id="student-id-forgot" 
            class="form-input" 
            placeholder="Nhập mã sinh viên..." 
            required
          />
        </div>

        <button type="submit" class="btn-login">GỬI YÊU CẦU</button>
      </form>

      <div class="login-footer">
        <a href="/index.html" class="forgot-password-link">← Quay lại đăng nhập</a>
      </div>
    </div>
  </div>

  <script src="/assets/js/api/config.js"></script>
  <script src="/assets/js/api/auth.js"></script>
  <script src="/assets/js/forgot-password.js"></script>
</body>
</html>
